<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#25D366"/>
      <stop offset="1" stop-color="#128C7E"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background, WhatsApp-adjacent green gradient -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Chat bubble with a small tail (bottom-left) -->
  <g fill="white">
    <rect x="24" y="28" width="80" height="56" rx="12"/>
    <polygon points="40,84 32,98 54,84"/>
  </g>

  <!-- Three privacy stripes inside bubble: shorter + fainter top→bottom,
       reading as "blurred / fading text" -->
  <g fill="#0d6b5f">
    <rect x="36" y="42" width="56" height="6" rx="3" opacity="0.92"/>
    <rect x="36" y="54" width="44" height="6" rx="3" opacity="0.58"/>
    <rect x="36" y="66" width="28" height="6" rx="3" opacity="0.28"/>
  </g>
</svg>
